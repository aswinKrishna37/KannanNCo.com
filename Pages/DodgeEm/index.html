<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dodge the Bananas!</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: sans-serif; background: #1a1a24; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; max-width: 600px; max-height: 800px; background: #2c3e50; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        canvas { width: 100%; height: 100%; display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .stats { display: flex; justify-content: space-between; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        #game-over-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); pointer-events: auto; flex-direction: column; align-items: center; justify-content: center; }
        h1 { font-size: 48px; margin-bottom: 20px; color: #ff7675; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        button { padding: 15px 40px; font-size: 20px; border: none; background: #f1c40f; color: #2c3e50; font-weight: bold; border-radius: 30px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="canvas-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <div class="stats">
            <div id="score-display">Score: 0</div>
            <div id="lives-display">❤️❤️❤️</div>
        </div>
    </div>
    <div id="game-over-screen">
        <h1 id="over-text">GAME OVER</h1>
        <button onclick="resetGame()">Try Again</button>
    </div>
</div>

<script>
    // ================= CONFIGURATION =================
    const IMG_FACE = 'assets/face.webp';
    const IMG_BANANA = 'assets/bannana.webp';
    const IMG_HEAD_BANANA = 'assets/bannana_head.webp';
    const IMG_MONKEY = 'assets/monkey.webp';
    const IMG_BG = 'assets/background.webp'; // <-- Add your background image path here
    // =================================================

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gameOverScreen = document.getElementById('game-over-screen');
    const scoreDisplay = document.getElementById('score-display');
    const livesDisplay = document.getElementById('lives-display');

    // Base coordinates setup
    canvas.width = 600;
    canvas.height = 800;

    // Load Assets
    const images = {};
    let assetsLoaded = 0;
    const assetSources = { 
        face: IMG_FACE, 
        banana: IMG_BANANA, 
        headBanana: IMG_HEAD_BANANA, 
        monkey: IMG_MONKEY,
        bg: IMG_BG 
    };

    const totalAssets = Object.keys(assetSources).length;
    for (let key in assetSources) {
        images[key] = new Image();
        images[key].src = assetSources[key];
        images[key].onload = () => { if (++assetsLoaded === totalAssets) startGame(); };
    }

    // Game state
    let player, monkeys, bananas, score, lives, isGameOver, spawnTimer, lastSpawnTime;

    class Player {
        constructor() {
            this.width = 100;
            this.height = 100;
            this.x = canvas.width / 2 - this.width / 2;
            this.y = canvas.height - this.height - 30;
            this.targetX = this.x;
            this.speed = 0.25; 
            this.isInvincible = false;
            this.invincibilityDuration = 500; // 500ms
        }
        update() {
            this.x += (this.targetX - this.x) * this.speed;
            this.x = Math.max(0, Math.min(this.x, canvas.width - this.width));
        }
        triggerInvincibility() {
            this.isInvincible = true;
            setTimeout(() => {
                this.isInvincible = false;
            }, this.invincibilityDuration);
        }
        draw() {
            ctx.save();
            // Make player translucent when invincible
            if (this.isInvincible) {
                ctx.globalAlpha = 0.5;
            }
            
            ctx.drawImage(images.face, this.x, this.y, this.width, this.height);
            
            // Draw stacked bananas based on lost lives
            const bananasOnHead = 3 - lives;
            for (let i = 0; i < bananasOnHead; i++) {
                ctx.drawImage(images.headBanana, this.x + (this.width*0.1), this.y - 25 - (i * 20), this.width * 0.8, 40);
            }
            ctx.restore();
        }
    }

    class Monkey {
        constructor(x) {
            this.x = x;
            this.y = 40;
            this.width = 70;
            this.height = 70;
            this.direction = Math.random() < 0.5 ? -1 : 1;
            this.speed = Math.random() * 2 + 1;
        }
        update() {
            this.x += this.speed * this.direction;
            if (this.x <= 10 || this.x >= canvas.width - this.width - 10) {
                this.direction *= -1;
            }
        }
        draw() {
            ctx.drawImage(images.monkey, this.x, this.y, this.width, this.height);
        }
    }

    class Banana {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.width = 30;
            this.height = 45;
            // Cap the dynamic velocity calculation to keep dodging humanly possible
            const speedBoost = Math.min(score * 0.04, 6);
            this.speed = Math.random() * 1 + 4 + speedBoost;
        }
        update() {
            this.y += this.speed;
        }
        draw() {
            ctx.drawImage(images.banana, this.x, this.y, this.width, this.height);
        }
    }

    function startGame() {
        resetGame();
        loop();
    }

    function resetGame() {
        player = new Player();
        monkeys = [new Monkey(50), new Monkey(250), new Monkey(450)];
        bananas = [];
        score = 0;
        lives = 3;
        isGameOver = false;
        spawnTimer = 0;
        lastSpawnTime = 0;
        gameOverScreen.style.display = 'none';
        updateUI();
    }

    function updateUI() {
        scoreDisplay.innerText = `Score: ${score}`;
        livesDisplay.innerText = '❤️'.repeat(Math.max(0, lives)) + '🖤'.repeat(Math.max(0, 3 - lives));
    }

    function handleMove(clientX) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        player.targetX = (clientX - rect.left) * scaleX - player.width / 2;
    }

    window.addEventListener('mousemove', (e) => handleMove(e.clientX));
    window.addEventListener('touchmove', (e) => {
        if (e.touches.length > 0) handleMove(e.touches[0].clientX);
    }, { passive: true });

    function loop() {
        // 1. Draw Background Image
        ctx.drawImage(images.bg, 0, 0, canvas.width, canvas.height);

        // Draw background wire
        ctx.strokeStyle = 'rgba(44, 62, 80, 0.6)';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(0, 95);
        ctx.lineTo(canvas.width, 95);
        ctx.stroke();

        if (!isGameOver) {
            player.update();
            
            spawnTimer++;
            monkeys.forEach(monkey => {
                monkey.update();
                
                // Enforce a minimum interval global window (e.g., 25 frames) between any banana drops
                // to guarantee the layout is physically dodgeable.
                if (spawnTimer % 45 === 0 && (spawnTimer - lastSpawnTime) > 25) {
                    if (Math.random() < 0.45) {
                        bananas.push(new Banana(monkey.x + monkey.width/2 - 15, monkey.y + monkey.height));
                        lastSpawnTime = spawnTimer;
                    }
                }
            });

            // Handle banana states
            for (let i = bananas.length - 1; i >= 0; i--) {
                bananas[i].update();

                // Hitbox collision calculation
                if (
                    bananas[i].x < player.x + player.width &&
                    bananas[i].x + bananas[i].width > player.x &&
                    bananas[i].y < player.y + player.height &&
                    bananas[i].y + bananas[i].height > player.y
                ) {
                    bananas.splice(i, 1);
                    
                    // Only process hit data if player isn't in an active i-frame window
                    if (!player.isInvincible) {
                        lives--;
                        player.triggerInvincibility();
                        updateUI();
                        
                        if (lives <= 0) {
                            isGameOver = true;
                            gameOverScreen.style.display = 'flex';
                        }
                    }
                    continue;
                }

                // Clean up missed drops
                if (bananas[i].y > canvas.height) {
                    bananas.splice(i, 1);
                    score += 10;
                    updateUI();
                }
            }
        }

        // Render everything
        bananas.forEach(b => b.draw());
        monkeys.forEach(m => m.draw());
        player.draw();

        requestAnimationFrame(loop);
    }
</script>

</body>
</html>
