<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Play the ultimate Rock Paper Scissors showdown game against Athulraj the young prodigy. Fast, interactive, and beautifully animated.">
    <title>Play RockPaperScissors with Athulraj</title>
    <link rel="icon" type="image/png" href="Assets/favicon.ico" />
    <link rel="stylesheet" href="RPS.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header id="heading">
            <h1>Rock Paper Scissors</h1>
            <h3>vs. Athulraj the Prodigy</h3>
        </header>

        <!-- Scoreboard & Reset -->
        <div class="scoreboard-container">
            <div class="scoreboard">
                <div class="score-card">
                    <span class="score-label">You</span>
                    <span class="score-val" id="playerScore">0</span>
                </div>
                <div class="score-divider">:</div>
                <div class="score-card">
                    <span class="score-label">Athulraj</span>
                    <span class="score-val" id="computerScore">0</span>
                </div>
            </div>
            <button id="resetScoresBtn" class="reset-btn" title="Reset Scores">
                Reset Score
            </button>
        </div>

        <!-- Game Arena -->
        <div class="image-container">
            <img id="gameImage" src="Assets/Athul-Scissors.png" alt="Athulraj's Hand Display">
            <div id="gameStatus" class="game-status">
                Make your move below to challenge Athulraj!
            </div>
        </div>

        <!-- Choices -->
        <div class="choices-container">
            <button class="choice-btn" id="rock" data-choice="rock">
                <span class="choice-emoji">✊</span> Rock
            </button>
            <button class="choice-btn" id="paper" data-choice="paper">
                <span class="choice-emoji">✋</span> Paper
            </button>
            <button class="choice-btn" id="scissors" data-choice="scissors">
                <span class="choice-emoji">✌️</span> Scissors
            </button>
        </div>
    </div>

    <script src="RPS.js?v=2"></script>
</body>
</html>
