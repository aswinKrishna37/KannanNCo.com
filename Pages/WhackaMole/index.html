<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whack Em!!</title>
    <link rel="icon" type="image/png" href="Assets/favicon.ico" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Whack-a-Aswin/John!</h1>

    <!-- Character Selection Screen -->
    <div id="selection-screen">
      <h2>Choose who to whack:</h2>
      <div class="character-container">
        <div class="character-card" onclick="selectCharacter('Assets/john.png')">
          <img src="Assets/john.png" alt="John" />
          <p>John</p>
        </div>
        <div class="character-card" onclick="selectCharacter('Assets/aswin.png')">
          <img src="Assets/aswin.png" alt="Aswin" />
          <p>Aswin</p>
        </div>
      </div>
    </div>

    <!-- Main Game Screen (Hidden initially) -->
    <div id="game-screen" style="display: none;">
      <h2>Score: <span class="score">0</span></h2>
      <button id="start" onClick="startGame()">Start</button>
      <div class="game">
        <div class="hole hole1">
          <div class="mole"></div>
        </div>
        <div class="hole hole2">
          <div class="mole"></div>
        </div>
        <div class="hole hole3">
          <div class="mole"></div>
        </div>
        <div class="hole hole4">
          <div class="mole"></div>
        </div>
        <div class="hole hole5">
          <div class="mole"></div>
        </div>
        <div class="hole hole6">
          <div class="mole"></div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
