<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Faheem</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 1600px;
            max-height: 900px;
            overflow: hidden;
            background: #87CEEB;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 32px;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        #gameOverScreen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }

        #gameOverScreen.show {
            display: flex;
        }

        .gameOverContent {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
        }

        .gameOverContent h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #333;
        }

        .gameOverContent p {
            font-size: 24px;
            margin-bottom: 30px;
            color: #666;
        }

        .gameOverContent button {
            padding: 15px 40px;
            font-size: 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .gameOverContent button:hover {
            background: #45a049;
        }

        #startScreen {
            display: flex;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 50;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }

        #startScreen.hidden {
            display: none;
        }

        .startContent {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
        }

        .startContent h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #333;
        }

        .startContent p {
            font-size: 20px;
            margin-bottom: 30px;
            color: #666;
        }

        .startContent button {
            padding: 15px 40px;
            font-size: 20px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .startContent button:hover {
            background: #0b7dda;
        }

        .instructions {
            color: #999;
            font-size: 16px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="scoreDisplay">Score: 0</div>
        
        <div id="startScreen">
            <div class="startContent">
                <h1>Flappy Faheem</h1>
                <p>Help Faheem fly through the pipes!</p>
                <p class="instructions">Press SPACE or Click to start</p>
                <button onclick="startGame()">Start Game</button>
            </div>
        </div>

        <div id="gameOverScreen">
            <div class="gameOverContent">
                <h1>Game Over!</h1>
                <p id="finalScore">Final Score: 0</p>
                <button onclick="location.reload()">Play Again</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Game variables
        let gameState = 'start'; // start, playing, gameOver
        let score = 0;
        let gravity = 0.6;
        let gameSpeed = 5;

        // Bird object
        const bird = {
            x: canvas.width * 0.2,
            y: canvas.height / 2,
            width: 100,
            height: 100,
            dy: 0,
            image: new Image(),
            draw() {
                ctx.drawImage(this.image, this.x, this.y, this.width, this.height);
            },
            update() {
                this.dy += gravity;
                this.dy = Math.min(this.dy, 10);
                this.y += this.dy;
            },
            flap() {
                this.dy = -8;
            }
        };

        // Load bird image
        bird.image.src = 'ASSETS/FaheemNOBg-Inverted.png';

        // Background image
        const backgroundImg = new Image();
        backgroundImg.src = 'Flappy_Bird_assets by kosresetr55/Game Objects/background-day.png';

        // Base image
        const baseImg = new Image();
        baseImg.src = 'Flappy_Bird_assets by kosresetr55/Game Objects/base.png';

        // Pipe image
        const pipeImg = new Image();
        pipeImg.src = 'Flappy_Bird_assets by kosresetr55/Game Objects/pipe-green.png';

        // Base object
        const base = {
            x: 0,
            y: canvas.height - 112,
            width: canvas.width,
            height: 112,
            draw() {
                ctx.drawImage(baseImg, this.x, this.y, this.width, this.height);
            }
        };

        // Pipes array
        let pipes = [];

        const pipeGap = 200;
        const pipeWidth = 52;

        function createPipe() {
            const minPipeY = 50;
            const maxPipeY = base.y - pipeGap - 50;
            const randomPipeY = Math.random() * (maxPipeY - minPipeY) + minPipeY;

            pipes.push({
                x: canvas.width,
                y: randomPipeY,
                width: pipeWidth,
                height: base.y,
                scored: false
            });
        }

        function drawPipe(pipe) {
            // Top pipe (inverted)
            ctx.save();
            ctx.translate(pipe.x + pipe.width / 2, pipe.y - pipe.height / 2);
            ctx.scale(1, -1);
            ctx.drawImage(pipeImg, -pipe.width / 2, -pipe.height / 2, pipe.width, pipe.height);
            ctx.restore();
            
            // Bottom pipe
            ctx.drawImage(pipeImg, pipe.x, pipe.y + pipeGap, pipe.width, pipe.height);
        }

        function updatePipes() {
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= gameSpeed;

                // Score
                if (!pipes[i].scored && pipes[i].x + pipes[i].width < bird.x) {
                    score++;
                    pipes[i].scored = true;
                    document.getElementById('scoreDisplay').textContent = 'Score: ' + score;
                }

                // Remove off-screen pipes
                if (pipes[i].x + pipes[i].width < 0) {
                    pipes.splice(i, 1);
                }
            }
        }

        function checkCollision() {
            // Check collision with base
            if (bird.y + bird.height > base.y) {
                return true;
            }

            // Check collision with ceiling
            if (bird.y < 0) {
                return true;
            }

            // Check collision with pipes
            for (let pipe of pipes) {
                if (bird.x + bird.width > pipe.x &&
                    bird.x < pipe.x + pipe.width) {
                    // Top pipe
                    if (bird.y < pipe.y) {
                        return true;
                    }
                    // Bottom pipe
                    if (bird.y + bird.height > pipe.y + pipeGap) {
                        return true;
                    }
                }
            }

            return false;
        }

        function drawBackground() {
            ctx.drawImage(backgroundImg, 0, 0, canvas.width, canvas.height);
        }

        function update() {
            if (gameState === 'playing') {
                bird.update();
                updatePipes();

                if (checkCollision()) {
                    gameState = 'gameOver';
                    document.getElementById('gameOverScreen').classList.add('show');
                    document.getElementById('finalScore').textContent = 'Final Score: ' + score;
                }
            }
        }

        function draw() {
            // Draw background
            drawBackground();

            // Draw pipes
            for (let pipe of pipes) {
                drawPipe(pipe);
            }

            // Draw base
            base.draw();

            // Draw bird
            bird.draw();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            pipes = [];
            score = 0;
            bird.y = canvas.height / 2;
            bird.dy = 0;
            document.getElementById('scoreDisplay').textContent = 'Score: 0';
            document.getElementById('gameOverScreen').classList.remove('show');
            setTimeout(() => {
                gameState = 'playing';
            }, 500);
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState === 'playing') {
                    bird.flap();
                } else if (gameState === 'start') {
                    startGame();
                }
            }
        });

        canvas.addEventListener('click', () => {
            if (gameState === 'playing') {
                bird.flap();
            } else if (gameState === 'start') {
                startGame();
            }
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            base.y = canvas.height - 112;
            base.width = canvas.width;
        });

        // Spawn pipes
        setInterval(() => {
            if (gameState === 'playing') {
                createPipe();
            }
        }, 2200);

        // Start game loop
        gameLoop();
    </script>
</body>
</html>
