<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spend Aron's Money</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f7f9fa;
            color: #2c3e50;
            padding-bottom: 40px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Top Bar Utilities */
        .top-utility-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 10px;
        }

        .btn-top-reset {
            background-color: #7f8c8d;
            color: white;
            padding: 8px 16px;
            font-size: 0.9rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-top-reset:hover {
            background-color: #95a5a6;
        }

        .btn-top-work {
            background-color: #e2a41a;
            color: white;
            padding: 8px 16px;
            font-size: 0.9rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-top-work:hover {
            background-color: #c98f12;
        }

        /* Profile Header Section */
        .header {
            background-color: #fff;
            padding: 30px;
            text-align: center;
            margin-bottom: 25px;
            position: relative;
            border-bottom: 4px solid #e2a41a;
            border-radius: 4px 4px 0 0;
        }

        .profile-pic {
            width: 125px;
            height: 125px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid #e2a41a;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
        }

        /* Money Sticky Bar */
        .money-bar {
            background-color: #e2a41a;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 2.2rem;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 100;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 4px;
        }

        /* Responsive Grid for Shop Items */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        /* Individual Card Design */
        .item-card {
            background-color: #fff;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            border: 1px solid #eef0f2;
        }

        .item-img {
            height: 120px;
            max-width: 100%;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .item-name {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .item-price {
            color: #e2a41a;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        /* Control Buttons Layout */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            width: 100%;
            max-width: 240px;
        }

        .btn {
            border: none;
            padding: 10px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 3px;
            transition: background 0.2s;
        }

        .btn:disabled {
            background-color: #bdc3c7 !important;
            color: #7f8c8d !important;
            cursor: not-allowed;
        }

        .btn-sell {
            background-color: #f1f2f6;
            color: #333;
        }

        .btn-sell.active {
            background-color: #e74c3c;
            color: white;
        }

        .btn-buy {
            background-color: #e2a41a;
            color: white;
        }

        .btn-buy:hover {
            background-color: #c98f12;
        }

        .item-count {
            border: 1px solid #ccc;
            border-radius: 3px;
            text-align: center;
            font-size: 1rem;
            width: 100%;
            outline: none;
        }
        
        .item-count::-webkit-outer-spin-button,
        .item-count::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* --- MODERN RESPONSIVE JOB GRID --- */
        .job-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .job-card {
            background: white;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            border: 1px solid #eef0f2;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .job-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.06);
        }

        .job-details h3 {
            font-size: 1.25rem;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .job-meta-metrics {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .metric-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 20px;
            background-color: #f8f9fa;
        }

        .metric-badge.duration {
            color: #7f8c8d;
            border: 1px solid #e1e4e6;
        }

        .metric-badge.payout {
            color: #b58110;
            background-color: #fdf6e7;
            border: 1px solid #f9e7c4;
        }

        /* FIXED PROGRESS BAR LAYOUT */
        .progress-bar-container {
            width: 100%;
            height: 8px;
            background-color: #e1e4e6;
            border-radius: 4px;
            margin-bottom: 15px;
            overflow: hidden;
            display: block; 
            visibility: hidden; 
        }

        .progress-bar {
            height: 100%;
            background-color: #e2a41a;
            width: 0%;
            border-radius: 4px;
        }

        .btn-job {
            background-color: #e2a41a;
            color: white;
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-job:hover:not(:disabled) {
            background-color: #c98f12;
        }

        .work-header {
            background: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-radius: 4px;
            border-left: 4px solid #e2a41a;
        }

        .btn-back {
            background-color: #34495e;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }
        .btn-back:hover { background-color: #2c3e50; }

        /* --- POPUP OVERLAY STYLING --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-box {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: popIn 0.3s ease-out;
            position: relative;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .btn-modal-close {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            color: #bdc3c7;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
        }

        .btn-modal-close:hover { color: #7f8c8d; }

        .modal-img {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.8rem;
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .modal-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .btn-modal-reset { background-color: #e74c3c; color: white; }
        .btn-modal-reset:hover { background-color: #c0392b; }

        .btn-modal-work { background-color: #e2a41a; color: white; }
        .btn-modal-work:hover { background-color: #c98f12; }

        .view-section { display: none; }
        .view-section.active { display: block; }

        /* Mobile Layout Breakpoints */
        @media (max-width: 900px) {
            .shop-grid { grid-template-columns: repeat(2, 1fr); }
            .job-grid { grid-template-columns: 1fr; gap: 15px; }
        }

        @media (max-width: 600px) {
            .shop-grid { grid-template-columns: 1fr; }
            .money-bar { font-size: 1.8rem; padding: 15px; }
            .modal-buttons { grid-template-columns: 1fr !important; }
            .work-header { flex-direction: column; gap: 12px; text-align: center; }
            .btn-back { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="spend-view" class="view-section active">
            <div class="top-utility-bar">
                <button class="btn-top-work" onclick="switchView('work-view')">Go Work 💼</button>
                <button class="btn-top-reset" onclick="triggerFullReset()">Reset Game</button>
            </div>

            <div class="header">
                <img src="./ASSETS/aron_pfp.png" alt="Aron" class="profile-pic">
                <h1>Spend Aron's Money</h1>
            </div>

            <div class="money-bar class-money-display">₹13,000</div>
            <div class="shop-grid" id="shop-grid"></div>
        </div>

        <div id="work-view" class="view-section">
            <div class="work-header">
                <h2>Available Jobs</h2>
                <button class="btn btn-back" onclick="switchView('spend-view')">← Back to Shop</button>
            </div>

            <div class="money-bar class-money-display">₹13,000</div>
            
            <div class="job-grid" id="job-list"></div>
        </div>

    </div>

    <div class="modal-overlay" id="broke-modal">
        <div class="modal-box">
            <button class="btn-modal-close" onclick="closeBrokeModal()">&times;</button>
            
            <img src="./ASSETS/aron_sad.webp" alt="Broke" class="modal-img">
            <div class="modal-title">You made Aron go broke!</div>
            <div class="modal-buttons">
                <button class="btn btn-modal-reset" onclick="triggerFullReset()">Reset</button>
                <button class="btn btn-modal-work" onclick="goToWorkFromModal()">Go Work</button>
            </div>
        </div>
    </div>

    <script>
        const STARTING_BALANCE = 13000;
        
        let currentBalance = localStorage.getItem('aron_balance') !== null ? parseInt(localStorage.getItem('aron_balance')) : STARTING_BALANCE;
        let inventory = localStorage.getItem('aron_inventory') !== null ? JSON.parse(localStorage.getItem('aron_inventory')) : {};
        
        let isBrokeModalDismissed = false;
        let isBusted = false; 

        const shopItems = [
            { id: "x-box", name: "Xbox Game Pass", price: 1089, image: "./ASSETS/menu/x-box.webp" },
            { id: "bindu-green-apple", name: "Bindu Green Apple Juice", price: 10, image: "./ASSETS/menu/bindu-green-apple.webp" },
            { id: "melody", name: "Melody Chocolaty", price: 1, image: "./ASSETS/menu/melody.webp" },
            { id: "lays", name: "Melody Chocolaty", price: 45, image: "./ASSETS/menu/lays.webp" },
            { id: "egg-puffs", name: "Egg Puffs", price: 20, image: "./ASSETS/menu/egg-puffs.webp" },
            { id: "biriyani", name: "Chicken Biriyani", price: 110, image: "./ASSETS/menu/biriyani.webp" },
            { id: "muthoot-cap", name: "Muthoot Cap", price: 999, image: "./ASSETS/menu/muthoot-cap.webp" },
            { id: "cavins", name: "Cavins MilkShake", price: 37, image: "./ASSETS/menu/cavins.webp" },
            { id: "icecream", name: "Cornetto Icecream", price: 50, image: "./ASSETS/menu/icecream.webp" },
            { id: "movie-ticket", name: "Cinema Ticket", price: 399, image: "./ASSETS/menu/movie-ticket.webp" },
            { id: "gta", name: "GTA VI", price: 6999, image: "./ASSETS/menu/gta.webp" },
            { id: "plant", name: "Plant a Sapling🙌🏻", price: 50, image: "./ASSETS/menu/plant.webp" },
            { id: "cat", name: "Adopt a car🥺", price: 200, image: "./ASSETS/menu/cat.webp" },
            { id: "ball", name: "BALL", price: 15, image: "./ASSETS/menu/ball.webp" },
            { id: "glasses", name: "Heldish Silver Black Square Sunglasses", price: 1499, image: "./ASSETS/menu/glasses.webp" },
            { id: "jordans", name: "Air Jordan 1 Retro", price: 39215, image: "./ASSETS/menu/jordans.webp" },
            { id: "gold", name: "18 carat 1g Gold", price: 10939, image: "./ASSETS/menu/gold.webp" },
            { id: "aron", name: "Aron Pokemon Card", price: 490, image: "./ASSETS/menu/aron.webp" },
            { id: "bennet", name: "Bennet <br><sub>(M1909)</sub>", price: 200, image: "./ASSETS/menu/bennet.webp" }
        ];

        const jobItems = [
            { id: "constable", name: "Constable Part Time", pay: 150, duration: 12 },
            { id: "feet-pics", name: "Sell Feet Pics", pay: 800, duration: 6 },
            { id: "jonny-sins", name: "Collab with Jonny Sins", pay: 900, duration: 3 },
            { id: "barista", name: "Barista", pay: 80, duration: 20 },
            { id: "jason", name: "Go to Palarivattom with Aaron Jason", pay: 500, duration: 25 },
            { id: "illegal", name: "Sell Drugs", pay: 1200, duration: 6 },
            { id: "swiggy", name: "Swiggy Delivery Partner", pay: 5, duration: 1 },
            { id: "data", name: "Data Entry", pay: 60, duration: 9 }
        ];

        shopItems.forEach(item => {
            if (inventory[item.id] === undefined) inventory[item.id] = 0;
        });

        const gridEl = document.getElementById('shop-grid');
        const jobListEl = document.getElementById('job-list');
        const modalEl = document.getElementById('broke-modal');

        function saveState() {
            localStorage.setItem('aron_balance', currentBalance);
            localStorage.setItem('aron_inventory', JSON.stringify(inventory));
        }

        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(view => view.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            renderInterface();
        }

        function goToWorkFromModal() {
            isBrokeModalDismissed = true; 
            modalEl.style.display = 'none'; 
            switchView('work-view');
        }

        function closeBrokeModal() {
            isBrokeModalDismissed = true;
            modalEl.style.display = 'none';
        }

        function renderInterface() {
            document.querySelectorAll('.class-money-display').forEach(el => {
                el.innerText = "₹" + currentBalance.toLocaleString();
            });

            gridEl.innerHTML = '';
            shopItems.forEach(item => {
                const count = inventory[item.id];
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <img src="${item.image}" alt="${item.name}" class="item-img">
                    <div class="item-name">${item.name}</div>
                    <div class="item-price">₹${item.price.toLocaleString()}</div>
                    <div class="controls">
                        <button class="btn btn-sell ${count > 0 ? 'active' : ''}" onclick="sellItem('${item.id}')" ${count <= 0 ? 'disabled' : ''}>Sell</button>
                        <input type="number" class="item-count" value="${count}" min="0" onchange="updateCount('${item.id}', this.value)">
                        <button class="btn btn-buy" onclick="buyItem('${item.id}')">Buy</button>
                    </div>
                `;
                gridEl.appendChild(card);
            });

            jobListEl.innerHTML = '';
            jobItems.forEach(job => {
                const card = document.createElement('div');
                card.className = 'job-card';
                card.innerHTML = `
                    <div class="job-details">
                        <h3>${job.name}</h3>
                        <div class="job-meta-metrics">
                            <span class="metric-badge duration">⏱️ ${job.duration}s</span>
                            <span class="metric-badge payout">💰 ₹${job.pay}</span>
                        </div>
                    </div>
                    <div class="progress-bar-container" id="progress-container-${job.id}">
                        <div class="progress-bar" id="progress-${job.id}"></div>
                    </div>
                    <button class="btn btn-job" id="btn-job-${job.id}" onclick="startJob('${job.id}')">Start Work</button>
                `;
                jobListEl.appendChild(card);
            });

            const modalTitleEl = modalEl.querySelector('.modal-title');
            if (isBusted) {
                modalTitleEl.innerText = "Aron got busted by the cops and lost 80% of his money!";
            } else {
                modalTitleEl.innerText = "You made Aron go broke!";
            }

            if ((currentBalance === 0 || isBusted) && !isBrokeModalDismissed) {
                modalEl.style.display = 'flex';
            } else {
                modalEl.style.display = 'none';
            }
        }

        window.startJob = function(jobId) {
            const job = jobItems.find(j => j.id === jobId);
            const buttons = document.querySelectorAll('.btn-job');
            const targetButton = document.getElementById(`btn-job-${jobId}`);
            const container = document.getElementById(`progress-container-${jobId}`);
            const bar = document.getElementById(`progress-${jobId}`);

            buttons.forEach(b => b.disabled = true);
            
            targetButton.innerText = "Working...";
            bar.style.transition = 'none';
            bar.style.width = '0%';
            container.style.visibility = 'visible';
            
            bar.offsetWidth; 

            bar.style.transition = `width ${job.duration}s linear`;
            bar.style.width = '100%';

            setTimeout(() => {
                if (job.id === "illegal" && Math.random() < 0.55) {
                    currentBalance = Math.floor(currentBalance * 0.2); 
                    isBusted = true;
                } else {
                    currentBalance += job.pay;
                    isBusted = false;
                }

                isBrokeModalDismissed = false; 
                
                saveState();
                
                bar.style.transition = 'none';
                bar.style.width = '0%';
                container.style.visibility = 'hidden';
                
                buttons.forEach(b => {
                    b.disabled = false;
                    b.innerText = "Start Work";
                });
                renderInterface();
            }, job.duration * 1000);
        };

        window.buyItem = function(id) {
            const item = shopItems.find(i => i.id === id);
            if (currentBalance >= item.price) {
                currentBalance -= item.price;
                inventory[id]++; 
                isBusted = false;
                isBrokeModalDismissed = false; 
                saveState();
                renderInterface();
            }
        };

        window.sellItem = function(id) {
            const item = shopItems.find(i => i.id === id);
            if (inventory[id] > 0) {
                const returnValue = Math.floor(item.price * 0.7); 
                currentBalance += returnValue;
                inventory[id]--;
                isBrokeModalDismissed = false;
                isBusted = false;
                saveState();
                renderInterface();
            }
        };

        window.updateCount = function(id, value) {
            const item = shopItems.find(i => i.id === id);
            let targetCount = parseInt(value) || 0;
            if (targetCount < 0) targetCount = 0;

            const currentCount = inventory[id];
            const difference = targetCount - currentCount;

            if (difference > 0) {
                const totalCost = difference * item.price;
                if (totalCost <= currentBalance) {
                    currentBalance -= totalCost;
                    inventory[id] = targetCount;
                    isBrokeModalDismissed = false;
                    saveState();
                }
            } else if (difference < 0) {
                const itemsToSell = Math.abs(difference);
                const returnValue = itemsToSell * Math.floor(item.price * 0.5);
                currentBalance += returnValue;
                inventory[id] = targetCount;
                isBrokeModalDismissed = false;
                isBusted = false;
                saveState();
            }
            renderInterface();
        };

        window.triggerFullReset = function() {
            localStorage.removeItem('aron_balance');
            localStorage.removeItem('aron_inventory');
            currentBalance = STARTING_BALANCE;
            isBrokeModalDismissed = false; 
            isBusted = false;
            shopItems.forEach(item => inventory[item.id] = 0);
            modalEl.style.display = 'none';
            switchView('spend-view');
        };

        renderInterface();
    </script>
</body>
</html>
