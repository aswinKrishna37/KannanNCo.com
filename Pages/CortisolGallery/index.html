<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortisol Scale</title>
    <link rel="icon" type="image/png" href="Assets/favicon.ico">
    <link rel="stylesheet" href="cortisol.css">
</head>
<body>

    <div class="header">
        <img src="../../Assets/Cortisol-Banner.png" alt="Image">
    </div>

    <img src="CortisolImages/20250915_150348.jpg" id="IMAGE">
    
    <div class="cortisol-container">
        <div class="scale-wrapper">
            <img src="Assets/cortisolframe.png" alt="Cortisol Scale Frame" class="scale-frame">
            <img src="Assets/cortisolpointer-short.png" alt="Cortisol Pointer" class="scale-pointer" id="pointer">
        </div>
        
        <div class="slider-container" id="sliderContainer">
            <input type="range" id="angleSlider" min="-90" max="90" value="-90">
        </div>
    </div>
    
    <script src="cortisol.js"></script>
</body>
</html>
