name: Generate HTML Dashboard

on:
  push:
    branches:
      - main # Change this to master if your default branch is named master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Build index.html from scratch
      run: |
        node -e "
        const fs = require('fs');
        const path = require('path');

        const pagesDir = path.join(process.cwd(), 'Pages');
        const indexPath = path.join(process.cwd(), 'index.html');

        // 1. Define the Top Portion of your website
        const htmlTop = \`<!DOCTYPE html>
        <html lang=\"en\">
        <head>
            <meta charset=\"UTF-8\">
            <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
            <title>KannanNCo</title>
            <link rel=\"icon\" type=\"image/png\" href=\"Assets/favicon.png\" />
            <link rel=\"stylesheet\" href=\"styles.css\">
        </head>
        <body>
            <div id=\"heading\">
                <h1>www.KannanNCo.com</h1>
                <h3>doubloo doubloo doubloo dot https slash KannanNCo dot com</h3>
            </div>

            <div class=\"card-grid\">\n\`;

        // 2. Define the Bottom Portion of your website
        const htmlBottom = \`    </div>
        </body>
        </html>\`;

        // 3. Scan the /Pages directory for games
        let folders = [];
        if (fs.existsSync(pagesDir)) {
            folders = fs.readdirSync(pagesDir).filter(file => {
                return fs.statSync(path.join(pagesDir, file)).isDirectory();
            });
        }

        // 4. Generate the middle card components dynamically
        let cardsHtml = '';
        folders.forEach(folder => {
            const metaPath = path.join(pagesDir, folder, 'meta.json');
            const expectedBannerPath = path.join(pagesDir, folder, 'banner.png');
            
            let title = folder.replace(/([A-Z])/g, ' $1').trim();
            let description = 'Click to play!';
            
            let banner = fs.existsSync(expectedBannerPath) 
                ? 'Pages/' + folder + '/banner.png' 
                : 'Assets/default-banner.png';

            if (fs.existsSync(metaPath)) {
                try {
                    const metaData = JSON.parse(fs.readFileSync(metaPath, 'utf8'));
                    title = metaData.title || title;
                    description = metaData.description || description;
                } catch (e) {
                    console.log('Error parsing meta.json in ' + folder);
                }
            }

            cardsHtml += '        <div class=\"card\" onclick=\"window.location.href=\'Pages/' + folder + '/index.html\'\">\n';
            cardsHtml += '             <img src=\"' + banner + '\" alt=\"' + title + '\" onerror=\"this.src=\'Assets/default-banner.png\'\">\n';
            cardsHtml += '             <h3>' + title + '</h3>\n';
            cardsHtml += '             <p>' + description + '</p>\n';
            cardsHtml += '        </div>\n\n';
        });

        // 5. Join all three pieces cleanly together
        const finalHtml = htmlTop + cardsHtml + htmlBottom;

        // 6. Write the final string directly into index.html
        fs.writeFileSync(indexPath, finalHtml);
        console.log('Successfully compiled raw pieces into index.html with ' + folders.length + ' cards!');
        "

    - name: Commit and Push updated index.html
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html
        git diff-index --quiet HEAD || git commit -m "Automated compile of index.html [skip ci]"
        git push