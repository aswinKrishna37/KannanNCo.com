name: Generate and Deploy HTML Dashboard

on:
  push:
    branches:
      - main # Change to master if your default branch is named master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Build index.html from scratch
      run: |
        node -e "
        const fs = require('fs');
        const path = require('path');

        const pagesDir = path.join(process.cwd(), 'Pages');
        const indexPath = path.join(process.cwd(), 'index.html');

        const htmlTop = \`<!DOCTYPE html>
        <html lang=\"en\">
        <head>
            <meta charset=\"UTF-8\">
            <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
            <title>KannanNCo</title>
            <link rel=\"icon\" type=\"image/png\" href=\"Assets/favicon.png\" />
            <link rel=\"stylesheet\" href=\"styles.css\">
        </head>
        <body>
            <div id=\"heading\">
                <h1>www.KannanNCo.com</h1>
                <h3>doubloo doubloo doubloo dot https slash KannanNCo dot com</h3>
            </div>

            <div class=\"card-grid\">\n\`;

        const htmlBottom = \`    </div>
        </body>
        </html>\`;

        let folders = [];
        if (fs.existsSync(pagesDir)) {
            folders = fs.readdirSync(pagesDir).filter(file => {
                return fs.statSync(path.join(pagesDir, file)).isDirectory();
            });
        }

        // 1. Gather all game data arrays first to allow sorting
        let gamesList = [];

        folders.forEach(folder => {
            const metaPath = path.join(pagesDir, folder, 'meta.json');
            const expectedBannerPath = path.join(pagesDir, folder, 'banner.png');
            
            let title = folder.replace(/([A-Z])/g, ' $1').trim();
            let description = 'Click to play!';
            let order = 9999; // Default large number so unordered games drop to the bottom

            let banner = fs.existsSync(expectedBannerPath) 
                ? 'Pages/' + folder + '/banner.png' 
                : 'Assets/default-banner.png';

            if (fs.existsSync(metaPath)) {
                try {
                    const metaData = JSON.parse(fs.readFileSync(metaPath, 'utf8'));
                    title = metaData.title || title;
                    description = metaData.description || description;
                    if (typeof metaData.order === 'number') {
                        order = metaData.order;
                    }
                } catch (e) {
                    console.log('Error parsing meta.json in ' + folder);
                }
            }

            gamesList.push({ folder, title, description, banner, order });
        });

        // 2. Sort the list by order index asc (lowest value first), fallback to alphabetical order
        gamesList.sort((a, b) => {
            if (a.order !== b.order) {
                return a.order - b.order;
            }
            return a.title.localeCompare(b.title);
        });

        // 3. Loop through the sorted array objects and append HTML blocks
        let cardsHtml = '';
        gamesList.forEach(game => {
            cardsHtml += '        <div class=\"card\" onclick=\"window.location.href=\'Pages/' + game.folder + '/index.html\'\">\n';
            cardsHtml += '             <img src=\"' + game.banner + '\" alt=\"' + game.title + '\" onerror=\"this.src=\'Assets/default-banner.png\'\">\n';
            cardsHtml += '             <h3>' + game.title + '</h3>\n';
            cardsHtml += '             <p>' + game.description + '</p>\n';
            cardsHtml += '        </div>\n\n';
        });

        const finalHtml = htmlTop + cardsHtml + htmlBottom;
        fs.writeFileSync(indexPath, finalHtml);
        console.log('Successfully built custom ordered index.html!');
        "

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4